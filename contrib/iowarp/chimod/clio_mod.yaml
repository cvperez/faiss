# faiss_ivf ChiMod Configuration
# Hosts FAISS IVF search inside the CLIO runtime; inverted lists are
# fetched on demand from CTE (tag/blob storage).

module_name: faiss_ivf
namespace: clio::run
version: 1.0.0

# Inherited Methods
kCreate: 0        # 0 - Create the container
kDestroy: 1       # 1 - Destroy the container
kNodeFailure: -1  # 2 - Not implemented
kRecover: -1      # 3 - Not implemented
kMigrate: -1      # 4 - Not implemented
kUpgrade: -1      # 5 - Not implemented
kMonitor: 9       # 9 - Monitor container state

# Custom Methods (start from 10)
kOpenIndex: 10    # Open a FAISS IndexIVF (metadata only) + CTE tag
kSearch: 11       # Batched k-NN search over inverted lists stored in CTE
kStats: 12        # Report / reset fetch+scan statistics
